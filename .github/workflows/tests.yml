name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Restore auth session
        run: |
          mkdir -p auth
          echo "$AUTH_JSON_B64" | base64 -d > auth/auth.json
        env:
          AUTH_JSON_B64: ${{ secrets.AUTH_JSON_B64 }}

      - name: Run tests
        run: pytest -m e2e --alluredir=allure-results
        env:
          NOTCH_BASE_URL: ${{ vars.NOTCH_BASE_URL || 'https://guardio.app.getnotch.dev' }}

      - name: Upload allure-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 1
          if-no-files-found: warn

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          if-no-files-found: ignore
          retention-days: 3

  report:
    needs: test
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download allure-results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results
        continue-on-error: true

      - name: Generate Allure report
        run: |
          npm install -g allure-commandline --silent
          allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 14

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  deploy:
    needs: [test, report]
    # test_failure_demo.py uses xfail(strict=True) — it is expected to fail.
    # An expected failure is recorded as XFAIL by pytest (exit code 0), so the
    # job result is still 'success' and Pages deploys normally.
    # If the test unexpectedly passes (XPASS), strict=True causes pytest to exit
    # with code 1, the job result becomes 'failure', and the deploy is blocked —
    # which is the correct behaviour (something unexpected changed).
    if: needs.test.result == 'success' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
